# Full-stack Vivi — the compose file the `vivi` CLI uses to orchestrate the app,
# proxy, and dind. This file is published verbatim as the `docker-compose.yml`
# release asset on every tag; the CLI fetches it at runtime.
#
# Env vars (set by the CLI):
#   VIVI_VERSION      image tag to pull (e.g. "v0.3.1" or "latest")
#   VIVI_CONFIG_DIR   host path to the vivi config directory (volume mount)
#   VIVI_DATA_DIR     host path to the vivi data directory (volume mount)
#   APP_PORT          host port for the UI (default: 7700)
#   HOST              hostname the server announces (default: 0.0.0.0)
#   PUBLIC_PORT_URL_BASE  optional HTTPS base URL for port-forward links
#                         (see README for the Cloudflare-tunnel use case)
#
# This file never contains `build:` stanzas — it is the release asset
# consumed by end users via the vivi CLI. Contributors iterating on the
# images should run `bun dev` or invoke docker compose directly from the
# repo checkout.

services:
  app:
    image: ghcr.io/telus-oss/vivi-app:${VIVI_VERSION:-latest}
    ports:
      - "${APP_PORT:-7700}:7700"
    environment:
      - PORT=7700
      - HOST=${HOST:-0.0.0.0}
      - PUBLIC_PORT_URL_BASE=${PUBLIC_PORT_URL_BASE:-}
      - CONTAINER_RUNTIME=docker
      # Skip proxy/dind lifecycle — managed by this compose file
      - MANAGED_COMPOSE=1
      # Paths the server uses for config and data (bind-mounted below).
      - VIVI_CONFIG_DIR=/app/config
      - VIVI_DATA_DIR=/app/data
      # HOST_DATA_DIR: when the app launches sandbox containers via the host
      # Docker daemon, bind-mount paths must resolve on the host, not in this
      # container. The CLI passes the real host path here.
      - HOST_DATA_DIR=${VIVI_DATA_DIR}
    volumes:
      - ${VIVI_DATA_DIR}:/app/data
      - ${VIVI_CONFIG_DIR}:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      proxy:
        condition: service_healthy
      dind:
        condition: service_started
    restart: unless-stopped

  proxy:
    image: ghcr.io/telus-oss/vivi-proxy:${VIVI_VERSION:-latest}
    networks:
      - sandbox
      - default
    environment:
      # Route sandbox → app traffic over the compose network. Avoids the
      # host-gateway hop that some Ubuntu iptables setups black-hole. The
      # `vivi start --host` mode overrides this to host.docker.internal:<port>
      # so the proxy can reach a server running natively on the host.
      - HOST_SERVER=${HOST_SERVER:-app:7700}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${VIVI_CONFIG_DIR}:/config:ro
      - proxy-ca:/ca
      - proxy-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7443/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  dind:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      - "127.0.0.1:2375:2375"
    volumes:
      - dind-storage:/var/lib/docker
    restart: unless-stopped

networks:
  sandbox:
    internal: true

volumes:
  proxy-ca:
  proxy-logs:
  dind-storage:
