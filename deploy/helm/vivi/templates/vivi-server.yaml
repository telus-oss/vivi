{{- if .Values.viviServer.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vivi-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vivi.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.viviServer.persistence.storageClass }}
  storageClassName: {{ .Values.viviServer.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.viviServer.persistence.size | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vivi-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vivi.labels" . | nindent 4 }}
    {{- include "vivi.viviServer.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.viviServer.replicas }}
  strategy:
    # Vivi server keeps in-memory session state — a rolling update would
    # double-attach to the same pods. RecreateOnUpdate is safer.
    type: Recreate
  selector:
    matchLabels:
      {{- include "vivi.viviServer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vivi.viviServer.selectorLabels" . | nindent 8 }}
        vivi.tenant: {{ include "vivi.tenant" . }}
    spec:
      serviceAccountName: vivi-server
      enableServiceLinks: false
      containers:
        - name: vivi-server
          image: {{ include "vivi.viviServer.image" . }}
          imagePullPolicy: {{ .Values.viviServer.image.pullPolicy }}
          env:
            - name: VIVI_BACKEND
              value: "k8s"
            - name: VIVI_K8S_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            # In-cluster mode: use the Pod's ServiceAccount token directly,
            # don't spawn `kubectl proxy`.
            - name: VIVI_K8S_IN_CLUSTER
              value: "1"
            # k8s sandboxes take longer to reach ready than docker (image
            # pulls + scheduling + multi-container startup). 30s default
            # times out before the entrypoint finishes its in-pod `git clone`.
            # 120s is comfortable for the typical github-import flow.
            - name: SANDBOX_READY_TIMEOUT
              value: {{ .Values.viviServer.sandboxReadyTimeoutMs | default "120000" | quote }}
            # Bun's fetch ignores the https.Agent that @kubernetes/client-node
            # configures with the in-cluster CA, so without this it rejects
            # the API server's cert as self-signed. Pointing NODE_EXTRA_CA_CERTS
            # at the projected ServiceAccount CA file lets Bun's fetch
            # validate the cluster API correctly.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            # Sandbox + proxy image refs used by server/k8s.ts when creating
            # pods. Should match the images the cluster can actually pull —
            # if you import images via `k3d image import`, set these to the
            # imported tags (e.g. vivi-sandbox:k8s, vivi-proxy:k8s).
            - name: VIVI_SANDBOX_IMAGE
              value: {{ printf "%s:%s" .Values.viviServer.sandboxImage.repository (.Values.viviServer.sandboxImage.tag | default .Chart.AppVersion) | quote }}
            - name: VIVI_PROXY_IMAGE
              value: {{ include "vivi.proxy.image" . | quote }}
            {{- if .Values.minio.enabled }}
            # Wire the in-namespace MinIO Deployment as the S3-compatible
            # backing store for profile snapshots. server/profile-storage.ts
            # reads these envs to decide whether to mirror saves to S3.
            - name: VIVI_S3_ENDPOINT
              value: "vivi-minio:9000"
            - name: VIVI_S3_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: VIVI_S3_USE_SSL
              value: "0"
            - name: VIVI_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: vivi-minio
                  key: rootUser
            - name: VIVI_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vivi-minio
                  key: rootPassword
            {{- end }}
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "7700"
            - name: VIVI_TENANT
              value: {{ include "vivi.tenant" . }}
            {{- if .Values.user.displayName }}
            - name: VIVI_TENANT_DISPLAY_NAME
              value: {{ .Values.user.displayName | quote }}
            {{- end }}
          ports:
            - containerPort: 7700
              name: http
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/sessions
              port: 7700
            periodSeconds: 5
          resources:
            {{- toYaml .Values.viviServer.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.viviServer.persistence.enabled }}
          persistentVolumeClaim:
            claimName: vivi-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: vivi-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vivi.labels" . | nindent 4 }}
spec:
  type: {{ .Values.viviServer.service.type | default "ClusterIP" }}
  selector:
    {{- include "vivi.viviServer.selectorLabels" . | nindent 4 }}
  ports:
    - port: 7700
      targetPort: 7700
      protocol: TCP
      name: http
      {{- if and (eq (.Values.viviServer.service.type | default "ClusterIP") "NodePort") .Values.viviServer.service.nodePort }}
      nodePort: {{ .Values.viviServer.service.nodePort }}
      {{- end }}
{{- if .Values.viviServer.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vivi-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vivi.labels" . | nindent 4 }}
  {{- with .Values.viviServer.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.viviServer.ingress.className }}
  ingressClassName: {{ .Values.viviServer.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.viviServer.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vivi-server
                port:
                  number: 7700
  {{- if .Values.viviServer.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.viviServer.ingress.host | quote }}
      secretName: {{ .Values.viviServer.ingress.tls.secretName | quote }}
  {{- end }}
{{- end }}
{{- end }}
