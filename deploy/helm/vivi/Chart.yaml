apiVersion: v2
name: vivi
description: |
  Per-user namespace for Vivi — sandboxed AI coding agent.
  Templates one namespace per Helm release (one per user). Inside the
  namespace: proxy Deployment + Service, RBAC for the Vivi server, optional
  Vivi server Deployment + Ingress, ResourceQuota, LimitRange, NetworkPolicy.
