# Vivi per-user namespace values.
#
# Recommended install pattern, one Helm release per user:
#
#   helm install alice deploy/helm/vivi \
#     --namespace vivi-user-alice --create-namespace \
#     --set user.name=alice
#
# The release name is the tenant identifier and shows up in resource labels.

user:
  # Tenant identifier. Used in labels and (optionally) as part of host names.
  # Defaults to the Helm release name if unset.
  name: ""

  # Human-readable display name shown in Vivi's UI title.
  displayName: ""

# ──────────────────────────────────────────────────────────────────────────
# Resource quota — caps the namespace's CPU/memory/Pod/PVC counts.
# Disable for unlimited tenants (e.g. self-hosted single-user).
# ──────────────────────────────────────────────────────────────────────────
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    pods: "20"
    services: "30"

# Default request/limit applied to every container that doesn't set its own.
limitRange:
  enabled: true
  defaultRequest:
    cpu: "100m"
    memory: 256Mi
  defaultLimit:
    cpu: "1"
    memory: 1Gi

# NetworkPolicy — default-deny ingress/egress on every pod, with selective
# allow rules. Requires a CNI that enforces NetworkPolicy (Calico, Cilium,
# weave-net — NOT minikube's default kindnet/bridge).
networkPolicy:
  enabled: false
  # Allow DNS lookups to kube-system DNS (UDP/TCP 53). Required for cluster
  # service name resolution.
  allowDns: true

# ──────────────────────────────────────────────────────────────────────────
# Proxy — vivi-proxy Deployment + Service.
# Each tenant gets their own — secrets stored in the namespace, not shared.
# ──────────────────────────────────────────────────────────────────────────
proxy:
  image:
    repository: ghcr.io/telus-oss/vivi-proxy
    tag: "" # defaults to chart's appVersion if empty
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Where the proxy reaches the Vivi server. Default points back into the
  # cluster at vivi-server:7700 in this same namespace. Set to a host URL
  # (e.g. "host.minikube.internal:7700") for host-side Vivi server mode.
  hostServer: "vivi-server:7700"

  # Default proxy /config files. These match the seeds the host-side Vivi
  # server writes (see migrations/001_initial_schema.sql + server/proxy.ts
  # defaults). Override per-tenant if you need a stricter allowlist or a
  # different git policy.
  #
  # When the host-side Vivi server runs in k8s mode, it overwrites this
  # ConfigMap (server/k8s.ts → syncProxyConfig); the values here only matter
  # for chart-only / in-cluster Vivi installs.
  config:
    allowlist:
      enabled: true
      hosts:
        - registry.npmjs.org
        - "*.github.com"
        - "*.githubusercontent.com"
        - api.anthropic.com
        - downloads.anthropic.com
        - platform.claude.com
    gitPolicy:
      enabled: true
      gitHosts:
        - github.com
        - api.github.com
      allowFetch: true
      allowPush: false
      allowPrCreation: true
      protectedBranches:
        - main
        - master
      allowReadFromUpstream: true
    # Map of name → { key, baseUrl }. Empty by default — the host server
    # injects real API keys when the user adds them in the UI.
    secrets: {}

# ──────────────────────────────────────────────────────────────────────────
# Vivi server — Deployment + Service + optional Ingress.
# Set enabled: false if the user runs Vivi on their own machine and only
# wants the cluster-side resources (proxy, RBAC, quota).
# ──────────────────────────────────────────────────────────────────────────
viviServer:
  enabled: true
  image:
    repository: ghcr.io/telus-oss/vivi-app
    tag: "" # defaults to chart's appVersion if empty
    pullPolicy: IfNotPresent
  # Image used for each sandbox pod (not the Vivi server itself). Must be a
  # tag the cluster can actually pull — if you import locally-built images
  # via `k3d image import`, set this to the imported tag (e.g. vivi-sandbox:k8s).
  sandboxImage:
    repository: ghcr.io/telus-oss/vivi-sandbox
    tag: "" # defaults to chart's appVersion if empty

  # Service shape for vivi-server. NodePort is required when fronting with an
  # external proxy (cloudflared, nginx, etc.) that lives outside the cluster.
  service:
    type: ClusterIP
    nodePort: 0   # only honored when type == NodePort; 0 lets k8s pick

  # How long a single sandbox pod can take to reach "ready" before the server
  # gives up and tears the pod down. k8s sandboxes are slower than docker
  # because of image-pull + scheduling overhead; 120s is comfortable for the
  # typical github-import flow with both sandbox and podman images cached.
  sandboxReadyTimeoutMs: 120000

  # Extra env vars to set on the vivi-server container. Useful for tuning
  # things like sandbox memory limits without changing chart code, e.g.:
  #   extraEnv:
  #     - name: VIVI_K8S_SANDBOX_MEMORY_LIMIT
  #       value: "4Gi"
  #     - name: VIVI_K8S_PODMAN_MEMORY_LIMIT
  #       value: "2Gi"
  extraEnv: []

  # Base URL the UI uses for forwarded sandbox ports. The port-forward
  # subdomain (`p-<port>-<sessionPrefix>`) is prepended to this URL's host,
  # so e.g. `https://example.com` makes the UI advertise
  # `https://p-3000-abc.example.com`. Match this to a wildcard DNS / ingress
  # entry that routes back to vivi-server. Leave empty to fall back to
  # HOST:PORT URLs (useful only for same-machine access).
  publicPortUrlBase: ""
  replicas: 1
  resources:
    requests:
      cpu: "200m"
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  # Persistent storage for the SQLite database + uploaded staging bundles.
  persistence:
    enabled: true
    storageClass: ""  # blank = cluster default
    size: 5Gi

  ingress:
    enabled: false
    className: ""
    # Annotations for OIDC auth (oauth2-proxy in front of the Service).
    # Adjust the auth-url / auth-signin annotations to point at your auth setup.
    annotations: {}
      # nginx.ingress.kubernetes.io/auth-url: "https://auth.example.com/oauth2/auth"
      # nginx.ingress.kubernetes.io/auth-signin: "https://auth.example.com/oauth2/start?rd=$escaped_request_uri"
    host: ""   # e.g. alice.vivi.example.com
    tls:
      enabled: false
      secretName: ""

# ──────────────────────────────────────────────────────────────────────────
# RBAC — ServiceAccount that the Vivi server uses to manage Pods, Services,
# ConfigMaps, etc. *inside this namespace*. Scope is intentionally narrow:
# no cluster-wide permissions, no cross-namespace access.
# ──────────────────────────────────────────────────────────────────────────
rbac:
  create: true

# ──────────────────────────────────────────────────────────────────────────
# Profile storage — optional in-namespace MinIO Deployment used as an
# S3-compatible profile backing store. Disable to wire an external S3 instead.
# ──────────────────────────────────────────────────────────────────────────
minio:
  enabled: false
  image:
    repository: quay.io/minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  # Auto-generated when blank.
  rootUser: ""
  rootPassword: ""
  bucket: profiles

# ──────────────────────────────────────────────────────────────────────────
# Pod security profile applied to all sandbox/proxy Pods.
# ──────────────────────────────────────────────────────────────────────────
podSecurity:
  # Apply pod-security.kubernetes.io/enforce label to the namespace.
  enforce: "baseline"  # "restricted" rejects the podman sidecar's CAPs.
  warn: "baseline"
  audit: "baseline"
